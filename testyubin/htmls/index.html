<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 룰렛 돌리기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');

        body {
            font-family: 'Noto+Sans+KR', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #2d3436;
        }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        #canvas-container {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto;
        }

        #roulette-canvas {
            width: 100%;
            height: 100%;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        /* 룰렛 화살표 지시계 */
        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            z-index: 10;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .spin-button {
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .spin-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .spin-button:active {
            transform: translateY(1px);
        }

        .item-list-container {
            max-height: 200px;
            overflow-y: auto;
        }

        /* 커스텀 스크롤바 */
        .item-list-container::-webkit-scrollbar {
            width: 6px;
        }
        .item-list-container::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 10px;
        }

        /* 애니메이션 효과 */
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-popup {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="p-4">

    <div class="glass-morphism w-full max-w-4xl flex flex-col md:flex-row p-6 md:p-10 gap-8">
        
        <!-- 왼쪽: 룰렛 영역 -->
        <div class="flex-1 flex flex-col items-center justify-center">
            <h1 class="text-3xl font-bold mb-8 text-indigo-800">🎡 행운의 룰렛</h1>
            
            <div id="canvas-container">
                <svg class="arrow" viewBox="0 0 100 100">
                    <polygon points="50,100 20,0 80,0" fill="#e74c3c" />
                </svg>
                <canvas id="roulette-canvas" width="800" height="800"></canvas>
            </div>

            <button id="spin-btn" class="spin-button mt-10 px-10 py-4 bg-indigo-600 text-white rounded-full font-bold text-xl hover:bg-indigo-700">
                돌리기!
            </button>
        </div>

        <!-- 오른쪽: 컨트롤 영역 -->
        <div class="w-full md:w-80 flex flex-col gap-6 border-t md:border-t-0 md:border-l border-gray-200 pt-6 md:pt-0 md:pl-8">
            <div>
                <h2 class="text-lg font-semibold mb-3 flex items-center gap-2">
                    <i class="fas fa-list-ul text-indigo-500"></i> 항목 설정
                </h2>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="item-input" placeholder="항목 입력..." class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    <button id="add-btn" class="bg-emerald-500 text-white px-4 py-2 rounded-lg hover:bg-emerald-600">추가</button>
                </div>
                <div id="item-list" class="item-list-container space-y-2">
                    <!-- 항목이 여기에 추가됩니다 -->
                </div>
            </div>

            <div id="result-container" class="hidden mt-auto">
                <div class="result-popup bg-indigo-50 border-2 border-indigo-200 p-4 rounded-xl text-center">
                    <p class="text-indigo-600 text-sm font-medium mb-1">축하합니다! 당첨 결과:</p>
                    <p id="result-text" class="text-2xl font-bold text-indigo-900"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- 결과 알림 모달 (선택 사항) -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="text-6xl mb-4">🎉</div>
            <h3 class="text-xl font-bold mb-2">당첨되었습니다!</h3>
            <p id="modal-result" class="text-3xl font-extrabold text-indigo-600 mb-6"></p>
            <button onclick="closeModal()" class="w-full py-3 bg-gray-800 text-white rounded-xl font-bold hover:bg-gray-900 transition-colors">닫기</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('roulette-canvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spin-btn');
        const itemInput = document.getElementById('item-input');
        const addBtn = document.getElementById('add-btn');
        const itemListElement = document.getElementById('item-list');
        const resultContainer = document.getElementById('result-container');
        const resultText = document.getElementById('result-text');
        const modal = document.getElementById('modal');
        const modalResult = document.getElementById('modal-result');

        let items = ['점심 사기', '커피 쏘기', '다음 기회에', '꽝', '심부름하기', '보너스'];
        let colors = [];
        let isSpinning = false;
        let currentRotation = 0;

        // 색상 팔레트 생성
        function generateColors(num) {
            const palette = [
                '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', 
                '#98D8C8', '#F7DC6F', '#BB8FCE', '#82E0AA',
                '#F1948A', '#85C1E9'
            ];
            colors = [];
            for (let i = 0; i < num; i++) {
                colors.push(palette[i % palette.length]);
            }
        }

        function drawRoulette() {
            const num = items.length;
            const arc = (2 * Math.PI) / num;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2 - 20;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            generateColors(num);

            items.forEach((item, i) => {
                const angle = i * arc;
                
                // 조각 그리기
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arc);
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 4;
                ctx.stroke();

                // 텍스트 그리기
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = 'white';
                ctx.font = 'bold 34px Noto Sans KR';
                ctx.shadowBlur = 4;
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.fillText(item, radius - 40, 10);
                ctx.restore();
            });

            // 중앙 원 장식
            ctx.beginPath();
            ctx.arc(centerX, centerY, 40, 0, 2 * Math.PI);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.strokeStyle = '#f1f2f6';
            ctx.lineWidth = 10;
            ctx.stroke();
        }

        function updateItemList() {
            itemListElement.innerHTML = '';
            items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between bg-gray-100 p-2 px-3 rounded-lg text-sm';
                div.innerHTML = `
                    <span class="truncate pr-2">${item}</span>
                    <button onclick="removeItem(${index})" class="text-gray-400 hover:text-red-500 transition-colors">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                itemListElement.appendChild(div);
            });
            drawRoulette();
        }

        function addItem() {
            const value = itemInput.value.trim();
            if (value) {
                items.push(value);
                itemInput.value = '';
                updateItemList();
            }
        }

        window.removeItem = function(index) {
            if (items.length <= 2) {
                alert('최소 2개 이상의 항목이 필요합니다.');
                return;
            }
            items.splice(index, 1);
            updateItemList();
        };

        function spin() {
            if (isSpinning) return;
            if (items.length < 2) return;

            isSpinning = true;
            resultContainer.classList.add('hidden');
            
            // 랜덤 회전값 계산 (최소 5바퀴 이상)
            const randomRotation = Math.floor(Math.random() * 360) + 1800; 
            currentRotation += randomRotation;
            
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // 애니메이션 종료 시점 계산 (5초)
            setTimeout(() => {
                isSpinning = false;
                
                // 실제 멈춘 각도 계산 (상단 화살표가 가리키는 곳이 당첨)
                // 캔버스가 시계방향으로 돌아가므로, 화살표(상단)는 270도 위치임
                const actualDeg = (currentRotation % 360);
                const arcDeg = 360 / items.length;
                
                // 캔버스의 0도는 우측 중앙임. 화살표는 상단(270도)에 있음.
                // 캔버스가 회전하므로 상대적인 각도를 계산: (360 - 90 - 회전각)
                let winningIndex = Math.floor(((360 - (actualDeg % 360) + 270) % 360) / arcDeg);
                
                const winner = items[winningIndex];
                
                // 결과 표시
                showResult(winner);
            }, 5000);
        }

        function showResult(winner) {
            resultText.innerText = winner;
            modalResult.innerText = winner;
            resultContainer.classList.remove('hidden');
            
            setTimeout(() => {
                modal.style.display = 'flex';
            }, 500);
        }

        window.closeModal = function() {
            modal.style.display = 'none';
        }

        // 이벤트 리스너
        spinBtn.addEventListener('click', spin);
        addBtn.addEventListener('click', addItem);
        itemInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addItem();
        });

        // 초기화
        window.onload = () => {
            updateItemList();
        };
    </script>
</body>
</html>
